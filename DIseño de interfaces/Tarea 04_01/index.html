<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Librería Los Enlaces</h1>
    </header>

    <main>
        <h2>Top ventas Nº1</h2>
        <div>
            <div>
                <img id="imagenDestacada" src="src/libro destacado.jpg" alt="Libro Wigetta Un viaje mágico" style="display: none;">
                <button id="buttonDescripcionImagen">Ver descripción</button>
                <p id="descripcionImagen" style="display: none;">Wigetta Un viaje mágico</p>
            </div>
            <div>
                <video id="videoDestacado" style="display: none;" controls>
                    <source src="src/inaguración librería.mp4">
                </video>
                <p id="descripciónVideo" style="display:none;">Esta es una descripción corta del video.</p>
            </div>
        </div>
    </main>

    <form>
        <h2>Formulario de compra</h2>

        <label for="nombre">Nombre</label>
        <input type="text" id="nombre">

        <label for="libro">Libro</label>
        <select id="libro">
            <option value="Wigetta Un viaje mágico">Wigetta Un viaje mágico</option>
        </select>

        <label for="correoElectronico">Correo electrónico</label>
        <input type="text" id="correoElectronico">

        <button type="button" id="buttonComprarLibro">Comprar ahora</button>
    </form>

    <footer></footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
