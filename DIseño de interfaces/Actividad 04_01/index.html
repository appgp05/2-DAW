<!-- 
PREGUNTAS
    EJERCICIO 1
        A)El DOM es la representación en memoria (en forma de árbol) de una página; el HTML es solo el código fuente que describe la estructura. El DOM es lo que el navegador crea a partir del HTML.
        B)No podemos manipular el DOM antes de que cargue porque los elementos aún no existen en memoria, así que el código no encuentra lo que quiere modificar.
        c) $(document).ready() (en jQuery) asegura que el DOM esté completamente cargado y accesible antes de ejecutar el código, evitando errores por intentar manipular elementos que todavía no se han creado.
    EJERCICIO 2
        A)La función each() recibe dos valores (índice y elemento) porque el índice indica la posición del elemento dentro de la colección que se está recorriendo mientras que elemento es la referencia directa al objeto actual (por ejemplo, un nodo del DOM o un elemento de un arreglo).
-->
