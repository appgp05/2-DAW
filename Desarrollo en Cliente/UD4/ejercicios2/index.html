<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <form>
        <div id="sesion">
            <p>Debe iniciar sesión</p>
        </div>
        <input type="password" id="contrasena" placeholder="Contraseña">
        <input type="button" value="Entrar" onclick="validar()">
        <input type="button" class="requiere-sesion" value="Consultar" onclick="consultar()" disabled>
        <input type="number" id="montoSacar" class="requiere-sesion" placeholder="Monto a sacar" disabled>
        <input type="button" class="requiere-sesion" value="Sacar" onclick="sacar()" disabled>
    </form>
    <div id="resultadoOperacion"></div>
</body>
