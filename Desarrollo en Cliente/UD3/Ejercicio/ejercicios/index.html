<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="ejercicio500"></div>
    
    <form>
        <input id="tallaEjercicioTalla" placeholder="Indicar la talla">
        <input type="button" value="Enviar" onclick="enviarFormularioTallas()"/>
    </form>
    <div id="ejercicioTalla"></div>
    
    <form>
        <input id="radioEjercicioLongitud" placeholder="Indicar el radio">
        <input type="button" value="Enviar" onclick="enviarFormularioLongitud()"/>
    </form>
    <div id="ejercicioLongitud"></div>

    <form>
        <div id="resultadoCalculo"></div>
        <button type="button" onclick="funcionalidadCalculadora('7')">7</button>
        <button type="button" onclick="funcionalidadCalculadora('8')">8</button>
        <button type="button" onclick="funcionalidadCalculadora('9')">9</button>
        <button type="button" onclick="funcionalidadCalculadora('/')">/</button>
        <button type="button" onclick="funcionalidadCalculadora('4')">4</button>
        <button type="button" onclick="funcionalidadCalculadora('5')">5</button>
        <button type="button" onclick="funcionalidadCalculadora('6')">6</button>
        <button type="button" onclick="funcionalidadCalculadora('*')">*</button>
        <button type="button" onclick="funcionalidadCalculadora('1')">1</button>
        <button type="button" onclick="funcionalidadCalculadora('2')">2</button>
        <button type="button" onclick="funcionalidadCalculadora('3')">3</button>
        <button type="button" onclick="funcionalidadCalculadora('+')">+</button>
        <button type="button" onclick="funcionalidadCalculadora('0')">0</button>
        <button type="button" onclick="funcionalidadCalculadora('=')">=</button>
        <button type="button" onclick="funcionalidadCalculadora('-')">-</button>
    </form>

    <p aria-valuemax="100">
        
    </p>
    
    <script src="index.js"></script>
</body>
</html>
