<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="formulario">
        <textarea name="mitexto" id="mitexto" placeholder="Introduce una frase" cols="30" rows="5"></textarea>
        <br>
        <input type="button" value="clickear" onclick="pulsar()"></input>
    </form>
    <div id="palabras"></div>
    <div id="calificaciones"></div>
<script>
    /* Para el div palabras: 
- Calcula y muestra el numero de palabras que están escritas en el textarea
- Muestra la ultima y la primera palabra del textarea
*/

/* Para el div calificaciones: 
Dado el siguiente array de notas de clase en la 1ª Evaluación. 
var notas = new Array(4.5, 4, 6, 1, 7.5, 10, 5.25, 4.5, 2, 1, 8,7.5, 1, 7.5, 8);
- Sacar el numero de alumnos aprobados
- Dado este array, sacar por pantalla todas las notas que no están repetidas
- Crea una funcion para comprobar las notas que estan por debajo de 5. Llama a esta función para sacar las notas pares de los alumnos que han suspendido
- Sacar las notas impares de los alumnos que han sacado al menos un 7
- Elimina del array las notas por debajo de 5
- Crea una función aleatoria que calcule numeros entre 5 y 10 sin decimales
- Llama a esta funcion aleatoria para rellenar el array, respetando las notas que no han sido eliminadas. 
- Muestra por pantalla el array con los nuevos elementos ordenandos de mayor a menor.

NOTA1: Emplea siempre que se pueda metodos y propiedades del objeto Array
NOTA2: Emplea if, for, for-in, for-of, do-while, while... */

    function pulsar(){
        let textoIntroducido = document.getElementsByName("mitexto")[0].value.trim()
        let palabrasDelTexto = textoIntroducido.split(/\s+/)
        console.log(palabrasDelTexto, palabrasDelTexto)

        document.getElementById("palabras").innerHTML = "<p>Palabras introducidas: "+palabrasDelTexto.length+"</p>"
        document.getElementById("palabras").innerHTML += "<p>Primera palabra: "+palabrasDelTexto[0]+"</p>"
        document.getElementById("palabras").innerHTML += "<p>Última palabra: "+palabrasDelTexto[palabrasDelTexto.length - 1]+"</p>"
    }

    var notas = new Array(4.5, 4, 6, 1, 7.5, 10, 5.25, 4.5, 2, 1, 8,7.5, 1, 7.5, 8);

    let divCalificaciones = document.getElementById("calificaciones")

    mostrarNotasAprobadas()
    mostrarNotasNoRepetidas()
    mostrarNotasPorDebajoDe5QueSeanPares()
    sacarNotasImparesConAlMenosUn7()

    eliminarLasNotasPorDebajoDe5()
    let numerosaleatorios = calcularNumerosEntre5Y10SinDecimales(3)
    anadirNumerosAleatoriosAlArray(numerosaleatorios)
    mostrarElArrayOrdenadoDeMayorAMenor()

    function mostrarNotasAprobadas(){
        divCalificaciones.innerHTML += "<h1>Notas aprobadas</h1>"
        for(let nota of notas){
            if(nota >= 5){
                divCalificaciones.innerHTML += "- "+nota+"<br>"
            }
        }
    }

    function mostrarNotasNoRepetidas(){
        //Repetidas: 4,5 7.5, 1, 8

        let notasNoRepetidas = []

        notas.forEach((nota, index) =>{
            let demasNotas = notas.slice()

            demasNotas[index] = null

            if(!demasNotas.includes(nota)){
                notasNoRepetidas.push(nota)
            }
        })

        console.log(notasNoRepetidas)

        divCalificaciones.innerHTML += "<h1>Notas no repetidas</h1>"
        for(let nota of notasNoRepetidas){
            divCalificaciones.innerHTML += "- "+nota+"<br>"
        }

        // for(let nota of notas){
        //     let demasNotas = notas
        //     demasNotas.(nota)
        //     console.log(demasNotas)

        //     for(let nota2 of demasNotas){
        //         if(nota == nota2){
        //             // console.log(nota)
        //         }
        //     }
        // }

        // for(let nota of notas){
        //     let demasNotas = notas
        //     demasNotas.(nota)
        //     console.log(demasNotas)

        //     for(let nota2 of demasNotas){
        //         if(nota == nota2){
        //             // console.log(nota)
        //         }
        //     }
        // }
    }

    function mostrarNotasPorDebajoDe5QueSeanPares(){
        divCalificaciones.innerHTML += "<h1>Suspensos pares</h1>"

        let suspensosPares = notas.filter((nota) => nota < 5 && nota % 2 == 0)
        for(let nota of suspensosPares){
            divCalificaciones.innerHTML += "- "+nota+"<br>"
        }
    }

    function sacarNotasImparesConAlMenosUn7(){
        divCalificaciones.innerHTML += "<h1>Notas impares mayores de 7</h1>"
        for(let nota of notas){
            if(nota > 7 && nota % 2 != 0){
                divCalificaciones.innerHTML += "- "+nota+"<br>"
            }
        }
    }

    function eliminarLasNotasPorDebajoDe5(){
        notas = notas.filter((nota) => nota >= 5)
        console.log("Notas después de eliminar los suspensos", notas)
    }

    function calcularNumerosEntre5Y10SinDecimales(cantidadDeNumeros){
        let numerosEntreEl5YEL10 = []

        for(let i = 0; i < cantidadDeNumeros; i ++){
            let numeroEntreEl5YEL10 = Math.ceil(Math.random()*6 + 4)
            numerosEntreEl5YEL10.push(numeroEntreEl5YEL10)
        }

        return numerosEntreEl5YEL10
    }

    function anadirNumerosAleatoriosAlArray(numerosAleatorios){
        for(let numero of numerosAleatorios){
            notas.push(numero)
        }

        console.log("Notas después de añadir los números aleatorios", notas, numerosAleatorios)
    }
    
    function mostrarElArrayOrdenadoDeMayorAMenor(){
        // notas.forEach((nota, index) => {
        //     notas.forEach((nota2, index2) => {
        //         if(nota < nota2){
        //             let notatemp = nota
        //             notas[index] = nota2
        //             notas[index2] = notatemp
        //         }
        //     })
        // })

        notas.forEach((nota, index) => {
            for(let i = 0; i < index; ++i){
                if(nota > notas[i]){
                    let notatemp = notas[index]
                    notas[index] = notas[i]
                    notas[i] = notatemp
                }
            }
        })

        console.log(notas)
    }

</script>
</body>
