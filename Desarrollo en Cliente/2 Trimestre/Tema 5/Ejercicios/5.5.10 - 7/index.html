<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form id="form">
        <input type="text" id="usuario" placeholder="Nombre de usuario">
        <input type="text" id="nif" placeholder="NIF">
        <input type="text" id="correo" placeholder="Correo electrónico">
        <input type="text" id="pais" placeholder="País de residencia">
        <button id="button">Validar</button>
    </form>

    <script>
        addEventListener("DOMContentLoaded", () => {
            let button = document.getElementById("button")
            button.addEventListener("click", (event) => {
                event.preventDefault()

                let form = document.forms["form"]
                let usuario = form.elements["usuario"].value
                let nif = form.elements["nif"].value
                let correo = form.elements["correo"].value
                let pais = form.elements["pais"].value

                let valido = true

                for (let element of form.elements) {
                    if (element.tagName != "BUTTON") {
                        if (element.value == "") {
                            valido = false
                        }
                    }
                }

                if (pais != "España" && pais != "Italia") {
                    valido = false
                }

                if (/hotmail\.com|yahoo\.es^/.test(correo)) {}

                valor = document.getElementById("nif").value;
                var letras = ['T', 'R', 'W', 'A', 'G', 'M', 'Y', 'F', 'P', 'D', 'X', 'B', 'N', 'J', 'Z', 'S', 'Q', 'V', 'H', 'L', 'C', 'K', 'E', 'T'];

                if (!(/^\d{8}[A-Z]$/.test(valor))) {
                    valido = false;
                }

                if (valor.charAt(8) != letras[(valor.substring(0, 8)) % 23]) {
                    valido = false;
                }

                console.log(valido)
            })
        })
    </script>
</body>

</html>
