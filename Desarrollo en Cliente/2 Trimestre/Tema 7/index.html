    <script>
        let recetasJSON = []
        let recetasXML = []

        let xhr = new XMLHttpRequest()

        xhr.onreadystatechange = function () {
            if (this.readyState === 4 && this.status === 200) {

                let xmlDoc = this.responseXML;

                let recetas = xmlDoc.getElementsByTagName("receta");

                for (let i = 0; i < recetas.length; i++) {
                    // console.log(recetas[i])
                    let receta = {
                        userId: recetas[i].getElementsByTagName("userId")[0].textContent,
                        id: recetas[i].getElementsByTagName("id")[0].textContent,
                        title: recetas[i].getElementsByTagName("title")[0].textContent,
                        body: recetas[i].getElementsByTagName("body")[0].textContent
                    }

                    recetasXML.push(receta)
                }

                pintarRecetas(recetasXML)
            } else if (this.readyState === 4) {
                console.error("No se pudo cargar el archivo: " + this.statusText);
            }
        }

        xhr.open("GET", "recetas.xml", true);
        xhr.send()

        function pintarRecetas(recetas) {
            let body = document.body
            let div = document.createElement("div")
            let divTitulo = document.createElement("h1")
            let divTextoTitulo = document.createTextNode("Recetas JSON")
            let tabla = document.createElement("table")

            body.appendChild(div)
            div.appendChild(divTitulo)
            divTitulo.appendChild(divTextoTitulo)
            div.appendChild(tabla)

            for (let titulo of Object.keys(recetas[0] ?? {})) {
                let th = document.createElement("th")
                let td = document.createElement("td")
                let text = document.createTextNode(titulo.toUpperCase())

                tabla.append(th)
                th.appendChild(td)
                td.appendChild(text)
            }

            for (let receta of recetas) {
                let tableRow = document.createElement("tr")

                for (let data of Object.values(receta)) {
                    let tableData = document.createElement("td")
                    let text = document.createTextNode(data)

                    tableRow.appendChild(tableData)
                    tableData.appendChild(text)
                }

                tabla.appendChild(tableRow)
            }
        }
