        // DEFINIR EL NODE SI NO EXISTE EN EL NAVEGADOR

        if (typeof Node == "undefined") {
            var Node = {
                ELEMENT_NODE: 1,
                ATTRIBUTE_NODE: 2,
                TEXT_NODE: 3,
                CDATA_SECTION_NODE: 4,
                ENTITY_REFERENCE_NODE: 5,

            }
        }

        
        // OBTENER ATRIBUTOS
        let p = document.getElementById("introduccion");
        
        let id = p.attributes.getNamedItem("id").nodeValue;
        let id2 = p.attributes.item(0).nodeValue;
        let id3 = p.getAttribute("id")

        // MODIFICAR ATRIBUTOS
        p.attributes.getNamedItem("id").nodeValue = "preintroduccion";

        // SETEAR O MODIFICAR ATRIBUTOS
        let atributo = document.createAttribute("lang");
        atributo.nodeValue = "es";
        p.attributes.setNamedItem(atributo);

        p.setAttribute("lang2", "en")
        p.setAttribute("lang3", "fr")

        // ELIMINAR UN ATRUBUTO
        p.attributes.removeNamedItem("lang2")
        p.removeAttribute("lang3")
