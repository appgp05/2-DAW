<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="introduccion" style="color: blue">Parrafo de prueba</p>
    <p id="introduccion" style="color: blue">Parrafosdasdasd de prueba</p>
</body>
<script type="text/javascript">
    let p = document.getElementById("introduccion");
    // let elId = p.attributes.getNamedItem("id").nodeValue; // elId = "introduccion"
    let elId = p.attributes.item(0).nodeValue; // elId = "introduccion"
    p.attributes.getNamedItem("id").nodeValue = "preintroduccion";

    let atributo = document.createAttribute("lang"); // atributo lang
    atributo.nodeValue = "es"; // lang=”es”
    p = document.getElementById("preintroduccion");
    p.attributes.setNamedItem(atributo); //
    console.log(elId);
    console.log(p);
    console.log(atributo);
</script>

</html>
