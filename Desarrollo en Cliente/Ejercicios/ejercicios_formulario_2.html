<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='ejercicios_formulario_2.css'>
    <script src='main.js'></script>
</head>
<body>
    <h1>Ejercicio 1</h1>
    <div id="">
        <form action="" id="container">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>/</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>*</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            <button>0</button>
            <button>=</button>
            <button>-</button>
        </form>
    </div>

    <h1>Ejercicio 2</h1>
    <form action="" enctype="multipart/form-data">
        <label for="nombre">Ingrese su nombre:</label>
        <input type="text" name="nombre" id="nombre"><br/>
        <label for="">Seleccione la foto:</label>
        <input type="file"><br/>
        <input type="submit">
    </form>

    <h1>Ejercicio 3</h1>
    <form action="">
        <fieldset>
            <legend>Datos Personales</legend>
            <label for="">Apellido y nombre:</label>
            <input type="text"><br/>
            <label for="">Documento de identidad:</label>
            <input type="text"><br/>
            <label for="">Fecha de nacimiento:</label>
            <input type="text"><br/>
            <label for="">Dirección:</label>
            <input type="text"><br/>
        </fieldset>
        <fieldset>
            <legend>Datos Laborales</legend>
            <label for="">Apellido y nombre:</label>
            <input type="text"><br/>
            <label for="">Actividad</label>
            <input type="text"><br/>
            <label for="">Dirección</label>
            <input type="text"><br/>
        </fieldset>
        <input type="submit">
    </form>
    
    <h1>Ejercicio 4</h1>
    <form action="">
        <label for="">Apellido y nombre:</label>
        <input type="text" name="" id=""><br/>
        <label for="">Es mayor de edad?:</label><br/>
        <input type="radio" name="mayorDeEdad" id="">Sí<br/>
        <input type="radio" checked name="mayorDeEdad" id="">No<br/>
        <label for="">Telefono:</label>
        <input type="tel"><br/>
        <textarea name="" id="" rows="5" cols="30" placeholder="Ingrese aquí sus comentarios"></textarea>
        <input type="submit">
    </form>
    
    <h1>Ejercicio 5</h1>
    <form action="">
        <table>
            <tr>
                <td><input type="text" placeholder="1" tabindex="1"></td>
                <td><input type="text" placeholder="4" tabindex="4"></td>
                <td><input type="text" placeholder="7" tabindex="7"></td>
            </tr>
            <tr>
                <td><input type="text" placeholder="2" tabindex="2"></td>
                <td><input type="text" placeholder="5" tabindex="5"></td>
                <td><input type="text" placeholder="8" tabindex="8"></td>
            </tr>
            <tr>
                <td><input type="text" placeholder="3" tabindex="3"></td>
                <td><input type="text" placeholder="6" tabindex="6"></td>
                <td><input type="text" placeholder="9" tabindex="9"></td>
            </tr>
        </table>
    </form>
    
    <h1>Ejercicio 6</h1>
    <form action="">
        <label><input type="radio" name="edad" id="ninos" disabled>Niños</label><br/>
        <label><input type="radio" name="edad" id="">Adolescentes</label><br/>
        <label><input type="radio" name="edad" id="">Mayores<br/></label>
        <input type="submit" name="" id="">
    </form>
    
    <h1>Ejercicio 7</h1>
    <form action="">
        <label for="nombre1">Nombre de usuario:</label>
        <input type="text" id="nombre1" maxlength="20"><br/>
        <label for="clave">Clave de usuario:</label>
        <input type="text" id="clave" maxlength="12">
        <input type="submit" name="" id="">
    </form>

    <h1>Ejercicio 8</h1>
    <h1>Inycom</h1>
    <textarea name="" id="" readonly cols="100" rows="15">
        Por el presente documento, [Nombre del Prestador] se compromete a realizar el servicio de [descripción del servicio] para [Nombre del Cliente], quien acepta las condiciones aquí estipuladas.

        El servicio se llevará a cabo entre los días [fecha de inicio] y [fecha de finalización], por un monto total de $[cantidad], que será abonado en [forma de pago].

        Ambas partes acuerdan mantener confidencialidad sobre cualquier información intercambiada y resolver cualquier diferencia de manera amistosa, o en su defecto, ante los tribunales de [Ciudad].

        Leído y aceptado por ambas partes:
    </textarea>
    
    <h1>Ejercicio 9</h1>
    <h1>Reclamos</h1>
    <form action="">
        <label for="">Ingrese su nombre:</label>
        <input type="text"><br/>
        <label for="">Ingrese su dirección:</label>
        <input type="text"><br/>
        <label for="">Informe del problema:</label><br/>
        <textarea name="" id=""></textarea>
        <input type="submit">
    </form>
    
    <h1>Ejercicio 10</h1>
    <form action="">
        <legend>Formulario de comentarios</legend>
        <label for="">Ingrese su nombre:</label>
        <input type="text"><br/>
        <label for="">Ingrese su mail:</label>
        <input type="email"><br/>
        <label for="">Comentarios:</label>
        <textarea name="" id=""></textarea><br/>
    </form>
</body>
</html>
