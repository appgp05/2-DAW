<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Formulario 1</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
</head>
<body>
    <h1>Ejercicio 1</h1>
    <form action="/registrardatos.php" method="get">
        <label for="name">Ingrese su nombre:</label>
        <input type="text" name="nombre" size="30">
        <p style="margin: 0">Seleccione los lenguages que conoce</p>
        <label><input type="checkbox" name="lenguaje[]" value="java">Java</label><br/>
        <label><input type="checkbox" name="lenguaje[]" value="c++">C++</label><br/>
        <label><input type="checkbox" name="lenguaje[]" value="c">C</label><br/>
        <label><input type="checkbox" name="lenguaje[]" value="c#">C#</label><br/>
        <input type="submit" value="Enviar">
    </form>

    <h1>Ejercicio 2</h1>
    <form novalidate>
        <label for="nombre">Ingrese su nombre:</label>
        <input type="text" id="nombre" required><br/>
        <label for="email">Ingrese su email:</label>
        <input id="email" type="text" size="30"><br/>
        <label for="comentarios">Comentarios:</label><br/>
        <textarea id="comentarios" type="text" rows="5" cols="30"></textarea><br/>
        <input type="submit" value="Enviar">
    </form>

    
    <h1>Ejercicio 3</h1>
    <form>
        <label for="">Ingrese su nombre:</label>
        <input type="text" name="" id=""><br/>
        <label for="">Seleccione el máximo nivel de estudios que tiene:</label><br/>
        <input type="radio" name="estudios">Sin estudios<br/>
        <input type="radio" name="estudios">Primario<br/>
        <input type="radio" name="estudios">Secundario<br/>
        <input type="radio" name="estudios universitarios">Universitario<br/>
        <input type="submit" value="Enviar">
    </form>

    <h1>Ejercicio 4</h1>
    <form action="">
        <p>Seleccione uno o varios colores (Presione Ctrl para seleccionar varios colores)</p>
        <select multiple name="colores">
            <option value="rojo">Rojo</option>
            <option value="verde">Verde</option>
            <option value="azul">Azul</option>
            <option value="amarillo">Amarillo</option>
        </select><br/>
        <input type="submit">
    </form>

    <h1>Ejercicio 5</h1>
    <form action="">
        <label for="">Seleccione una fruta o verdura:</label>
        <select name="" id="">
            <optgroup label="Frutas">
                <option value="naranjas">Naranjas</option>
                <option value="manzanas">Manzanas</option>
                <option value="frutilla">Frutilla</option>
                <option value="durazno">Durazno</option>
                <option value="ciruela">Ciruela</option>
            </optgroup>
            <optgroup label="Frutas">
                <option value="lechuga">Lechuga</option>
                <option value="acelga">Acelga</option>
                <option value="zapallo">Zapallo</option>
                <option value="papas">Papas</option>
                <option value="batatas">Batatas</option>
                <option value="zanahorias">Zanahorias</option>
                <option value="rabanitos">Rabanitos</option>
                <option value="calabaza">Calabaza</option>
            </optgroup>    
        </select><br/>
        <input type="submit">
    </form>
</body>
</html>
